<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>Update password — UKMAXX</title>
<meta name="description" content="Set a new password for your UKMAXX account.">
<meta name="theme-color" content="#0A7E8C">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<link rel="shortcut icon" href="/favicon.svg">
<link rel="apple-touch-icon" href="/favicon.svg">
<link rel="canonical" href="https://ukmaxx-site-5tc7.vercel.app/update-password.html">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./assets/css/variables.css">
<link rel="stylesheet" href="./assets/css/reset.css">
<link rel="stylesheet" href="./assets/css/base.css">
<link rel="stylesheet" href="./assets/css/components.css">
<link rel="stylesheet" href="./assets/css/pages/auth.css">
</head>
<body>

<div class="auth-page">

<a href="/" class="auth-logo" aria-label="UKMAXX — Home">
  <span class="logo-mark" aria-hidden="true"></span>
  UKMAXX
</a>

<section class="auth-hero" aria-label="Update password">
  <div class="auth-hero-inner">
    <span class="auth-eyebrow">Reset password</span>
    <h1 class="auth-title">Set new password</h1>
    <p class="auth-sub">Choose a strong password for your account. Min. 8 characters.</p>
  </div>
</section>

<div class="auth-card">
  <form class="auth-form" id="updatePwdForm" novalidate>
    <div class="field">
      <label for="newPassword" class="field-label">New password</label>
      <input type="password" id="newPassword" class="field-input" placeholder="Min. 8 characters" required autocomplete="new-password" minlength="8">
    </div>
    <div class="field">
      <label for="confirmPassword" class="field-label">Confirm password</label>
      <input type="password" id="confirmPassword" class="field-input" placeholder="Re-enter new password" required autocomplete="new-password">
    </div>
    <div id="updatePwdMsg" class="auth-msg"></div>
    <button type="submit" class="btn btn-primary auth-submit" id="updatePwdBtn">
      Update password
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true" width="16" height="16"><path d="M5 12h14M13 5l7 7-7 7"/></svg>
    </button>
  </form>
</div>

<div class="auth-footer">
  <a href="/signin.html">&larr; Back to sign in</a><br>
  <span class="auth-footer-mono">All products for research use only &middot; Not for human consumption</span>
</div>

</div>

<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script type="module" src="./assets/js/app.js"></script>
</body>
</html>
