<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UKMAXX — Access Restricted</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1f23;--surface:#10292e;--accent:#0A7E8C;--text:#e7f3f5;--dim:#9fbcc3;--border:#2b4a50}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;display:grid;place-items:center;min-height:100vh;padding:20px}
.card{width:min(560px,100%);background:var(--surface);border:1px solid var(--border);padding:26px;box-shadow:0 18px 40px rgba(0,0,0,.35)}
.logo{font-family:'Bebas Neue',sans-serif;letter-spacing:.08em;font-size:30px;color:var(--text);margin-bottom:10px}
h1{font-family:'Bebas Neue',sans-serif;font-size:44px;line-height:.95;margin:8px 0 10px}
p{color:var(--dim);line-height:1.7;font-size:14px}
a{display:inline-block;margin-top:14px;color:#8bd2db;text-decoration:none;border-bottom:1px solid #8bd2db}
</style>
</head>
<body>
  <div class="card">
    <div class="logo">UKMAXX</div>
    <h1>Access restricted.</h1>
    <p>This site is only available to users aged 18 or older.</p>
    <a href="/">Return</a>
  </div>
</body>
</html>
